<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secret Vault</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="vault-login-overlay" class="login-overlay">
      <div class="login-box panel">
        <h2>Enter Vault Password</h2>
        <form id="vault-login-form" class="form">
          <input id="vault-access-password" type="password" placeholder="Secret Vault password" required />
          <button type="submit" style="margin-top: 10px;">Unlock Vault</button>
          <p id="vault-login-message" class="message"></p>
        </form>
      </div>
    </div>

    <header class="header">
      <div class="header-content">
        <div>
          <h1>Secret Vault</h1>
          <p class="subtitle">Store quick credential references for dashboard team use.</p>
        </div>
        <a class="secret-vault-btn" href="/">Back to Dashboard</a>
      </div>
    </header>

    <main id="vault-content" class="layout hidden" style="grid-template-columns: minmax(280px, 640px); justify-content: center; gap: 20px; align-content: start;">
      <section class="panel">
        <h2 style="margin-top: 0;">Vault Entry</h2>
        <form class="form" id="vault-form">
          <label>
            Title
            <input id="vault-title" type="text" placeholder="e.g. Mango CMS" required />
          </label>

          <label>
            Link
            <input id="vault-link" type="url" placeholder="https://..." required />
          </label>

          <label>
            Username
            <input id="vault-username" type="text" placeholder="e.g. mango-admin" required />
          </label>

          <label>
            Password
            <div style="display: grid; gap: 10px;">
              <input id="vault-password" type="password" placeholder="e.g. secret_password" required />
              <button id="toggle-password-btn" type="button">Show Password</button>
            </div>
          </label>

          <button type="submit" id="add-vault-btn" style="margin-top: 15px; width: 100%;">Add Link</button>
        </form>
      </section>

      <section class="panel">
        <h2 style="margin-top: 0; display: flex; justify-content: space-between; align-items: center;">
          Saved Links
        </h2>
        <div id="vault-entries-list" style="display: grid; gap: 15px;">
          <!-- Items will be generated here by JavaScript -->
        </div>
      </section>
    </main>

    <script src="secret-vault.js"></script>
  </body>
</html>
